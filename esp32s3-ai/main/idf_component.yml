## IDF Component Manager manifest
## Run `idf.py update-dependencies` to resolve
##
## NOTE: The ST77916 LCD driver is NOT in the registry — copy it from the
## reference project into esp32s3-ai/components/:
##   cp -r .github/reference/esp32-s3-round-lcd/components/esp_lcd_st77916 \
##          esp32s3-ai/components/
## All other hardware drivers (LVGL_Driver, Touch_Driver, Audio_Driver, etc.)
## should also be copied from the reference project's main/ into components/.

dependencies:
  idf: ">=5.2.0"

  # LVGL UI framework
  lvgl/lvgl:
    version: "~8.3.0"

  # WebSocket client — published separately from the esp-protocols collection
  espressif/esp_websocket_client:
    version: ">=1.3.0,<1.7.0"   # 1.7.0 calls esp_transport_ws_get_redir_uri not in IDF 5.5

  # ESP-SR: wake word detection + Audio Front-End (VAD)
  espressif/esp-sr:
    version: ">=2.0.0"
