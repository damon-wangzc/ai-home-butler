# Mosquitto MQTT broker — AI Home Butler (Phase 4 / Phase 5)
# Development config: anonymous access, no TLS.
# For production: add a password_file and TLS listener.
#
# Topics:
#   butler/user/context  ← ESP32-S3 orb publishes {user_id, source, action}
#   butler/orb/touch     ← ESP32-S3 orb publishes {type, ts}
#   butler/orb/state     → orchestrator publishes  {state, text, emotion}
#   butler/reminders/due → orchestrator publishes  {id, user_id, message, wav}
#   butler/ugv/navigate  → orchestrator publishes  {room}
#
# The ESP32-S3 orb is a LAN device (not a container).
# Port 1883 must be reachable on the host's LAN interface (compose.yml: 1883:1883).

listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type information
